<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OliBot — Sign In</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: #111114;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #e4e2e8;
        }

        .card {
            background: #1a1a1e;
            border: 1px solid #2a2a30;
            border-radius: 8px;
            padding: 40px 32px;
            width: 100%;
            max-width: 380px;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #3249d7;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 20px;
        }

        h1 {
            color: #e4e2e8;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #6b6880;
            font-size: 13px;
            text-align: center;
            margin-bottom: 28px;
        }

        label {
            display: block;
            text-align: left;
            color: #8a8896;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .field {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            background: #111114;
            border: 1px solid #2a2a30;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e4e2e8;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s ease;
        }

        input::placeholder {
            color: #5a586a;
        }

        input:focus {
            border-color: #3249d7;
        }

        button.primary {
            width: 100%;
            background: #3249d7;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            font-family: inherit;
            border: none;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.15s ease;
            margin-top: 8px;
        }

        button.primary:hover {
            background: #2a3dbf;
        }

        button.primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            color: #f87171;
            background: rgba(248, 113, 113, 0.08);
            border: 1px solid rgba(248, 113, 113, 0.15);
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        @media (max-width: 420px) {
            .card {
                padding: 32px 24px;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">&#x1F916;</div>
        <h1>OliBot</h1>
        <p class="subtitle">Sign in to continue</p>

        <div id="error-msg" class="error"></div>

        <div class="field">
            <label for="email-input">Email</label>
            <input id="email-input" type="email" placeholder="you@company.com" autocomplete="email"
                onkeydown="if(event.key==='Enter') document.getElementById('pass-input').focus()">
        </div>
        <div class="field">
            <label for="pass-input">Password</label>
            <input id="pass-input" type="password" placeholder="Your password" autocomplete="current-password"
                onkeydown="if(event.key==='Enter') login()">
        </div>
        <button class="primary" id="login-btn" onclick="login()">Sign In</button>
    </div>

    <script>
        async function login() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('pass-input').value;
            const errEl = document.getElementById('error-msg');
            errEl.style.display = 'none';
            if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.style.display = 'block'; return; }
            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.error) {
                    errEl.textContent = data.error;
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Sign In';
                    return;
                }
                const basePath = window.location.pathname.replace(/\/login\.html$/, '') || '/';
                window.location.href = basePath + '/';
            } catch (e) {
                errEl.textContent = 'Network error. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        }
        document.getElementById('email-input').focus();
    </script>
</body>

</html>
